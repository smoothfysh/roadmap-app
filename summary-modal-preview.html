<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quarter Summary Modal — Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Mono', monospace; background: #fafaf9; color: #1c1917; min-height: 100vh; }

    /* ── Faint board + button row (shows placement) ── */
    .page { padding: 40px 24px 120px; }
    .board-hint {
      max-width: 1100px; margin: 0 auto; border: 1px dashed #d6d3d1; border-radius: 10px;
      min-height: 220px; display: flex; align-items: center; justify-content: center;
      color: #a8a29e; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
      background: linear-gradient(90deg, #f0fdf4 0 25%, #eff6ff 25% 50%, #fffbeb 50% 75%, #f8fafc 75% 100%);
      opacity: 0.5;
    }
    .action-row { max-width: 1100px; margin: 16px auto 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .ghost-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
      color: #57534e; background: transparent; border: 1px dashed #a8a29e; border-radius: 6px;
      padding: 8px 16px; cursor: pointer; transition: all 0.12s;
    }
    .ghost-btn:hover { color: #1c1917; border-color: #44403c; background: #fff; }
    .summary-trigger { border-style: solid; border-color: #ddd6fe; background: #f5f3ff; color: #6d28d9; }
    .summary-trigger:hover { border-color: #a78bfa; background: #ede9fe; color: #5b21b6; }

    /* ── Backdrop + modal ── */
    .backdrop {
      position: fixed; inset: 0; background: rgba(28,25,23,0.55);
      display: none; align-items: center; justify-content: center; padding: 24px; z-index: 50;
    }
    .backdrop.open { display: flex; }
    .modal {
      background: #fff; border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.28), 0 4px 16px rgba(0,0,0,0.12);
      width: 100%; max-width: 720px; max-height: 88vh; display: flex; flex-direction: column;
      overflow: hidden; animation: popIn 0.15s ease-out;
    }
    @keyframes popIn { from { opacity: 0; transform: scale(0.96) translateY(6px);} to { opacity: 1; transform: scale(1) translateY(0);} }

    .modal-header { padding: 18px 22px 14px; border-bottom: 1px solid #e7e5e4; display: flex; align-items: flex-start; gap: 12px; }
    .modal-header-left { flex: 1; min-width: 0; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      color: #6d28d9; background: #f5f3ff; border: 1px solid #ede9fe; padding: 3px 8px; border-radius: 4px; margin-bottom: 8px;
    }
    .modal-title { font-size: 17px; font-weight: 700; color: #1c1917; line-height: 1.3; }
    .modal-sub { font-size: 11px; color: #78716c; margin-top: 5px; line-height: 1.5; }
    .modal-close {
      flex-shrink: 0; background: none; border: none; cursor: pointer; color: #a8a29e; padding: 3px;
      font-size: 18px; line-height: 1; border-radius: 4px; transition: color 0.1s, background 0.1s;
    }
    .modal-close:hover { color: #1c1917; background: #f5f5f4; }

    .modal-body { padding: 20px 22px; overflow-y: auto; flex: 1; }
    .modal-footer { padding: 12px 22px; border-top: 1px solid #e7e5e4; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .footer-note { font-size: 10px; color: #a8a29e; letter-spacing: 0.04em; }

    .btn {
      font-family: inherit; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 8px 16px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: all 0.12s;
      display: inline-flex; align-items: center; gap: 7px;
    }
    .btn-dark  { background: #1c1917; color: #fff; }
    .btn-dark:hover { background: #292524; }
    .btn-light { background: #fff; color: #44403c; border-color: #d6d3d1; }
    .btn-light:hover { border-color: #78716c; color: #1c1917; }
    .btn-ghost { background: none; color: #78716c; }
    .btn-ghost:hover { color: #1c1917; }

    /* ── Rendered markdown ── */
    .rendered { font-size: 12.5px; line-height: 1.65; color: #292524; }
    .rendered h2 { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #6d28d9; margin: 20px 0 8px; padding-bottom: 5px; border-bottom: 1px solid #f0eef7; }
    .rendered h2:first-child { margin-top: 0; }
    .rendered h3 { font-size: 12.5px; font-weight: 700; color: #1c1917; margin: 14px 0 5px; }
    .rendered p { margin: 6px 0; }
    .rendered ul, .rendered ol { margin: 6px 0 10px; padding-left: 20px; }
    .rendered li { margin: 3px 0; }
    .rendered strong { font-weight: 700; color: #1c1917; }
    .rendered em { font-style: italic; }
    .rendered a { color: #6d28d9; text-decoration: underline; text-underline-offset: 2px; }
    .rendered code { background: #f5f5f4; border: 1px solid #e7e5e4; border-radius: 3px; padding: 1px 5px; font-size: 11px; }
    .rendered blockquote { border-left: 3px solid #ddd6fe; padding: 2px 0 2px 12px; margin: 8px 0; color: #57534e; font-style: italic; }
    .empty-view { text-align: center; color: #a8a29e; font-size: 12px; padding: 36px 20px; line-height: 1.6; }

    /* ── Editor ── */
    .toolbar {
      display: flex; gap: 4px; flex-wrap: wrap;
      border: 1px solid #d6d3d1; border-bottom: none; border-radius: 7px 7px 0 0; padding: 6px; background: #fafaf9;
    }
    .tb-btn {
      font-family: inherit; font-size: 11px; font-weight: 600; min-width: 28px; height: 26px; padding: 0 8px;
      border: 1px solid transparent; border-radius: 4px; background: transparent; color: #57534e; cursor: pointer;
      transition: all 0.1s; display: inline-flex; align-items: center; justify-content: center;
    }
    .tb-btn:hover { background: #fff; border-color: #d6d3d1; color: #1c1917; }
    .tb-sep { width: 1px; background: #e7e5e4; margin: 3px 2px; }
    .editor-split { display: grid; grid-template-columns: 1fr 1fr; }
    textarea.md-input {
      font-family: inherit; font-size: 12px; line-height: 1.6; color: #1c1917; width: 100%; min-height: 340px;
      resize: vertical; border: 1px solid #d6d3d1; border-radius: 0 0 0 7px; padding: 12px; background: #fff; outline: none;
    }
    textarea.md-input:focus { border-color: #a78bfa; }
    .preview-pane { border: 1px solid #d6d3d1; border-left: none; border-radius: 0 0 7px 0; background: #fafaf9; padding: 12px; overflow-y: auto; min-height: 340px; }
    .preview-label { font-size: 8px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #a8a29e; margin-bottom: 8px; }
    .md-hint { font-size: 10px; color: #a8a29e; margin-top: 8px; line-height: 1.5; }
    .md-hint code { background: #f5f5f4; padding: 0 3px; border-radius: 2px; }

    /* ── Demo controls ── */
    .demo-controls {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 100;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(6px); padding: 8px 12px; border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.14); border: 1px solid #e7e5e4;
    }
    .demo-controls span { font-size: 9px; color: #a8a29e; letter-spacing: 0.1em; text-transform: uppercase; align-self: center; margin-right: 4px; }
    .demo-btn { font-family: inherit; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; background: #1c1917; color: #fff; border: none; padding: 7px 12px; border-radius: 6px; cursor: pointer; }
    .demo-btn.sec { background: #fff; color: #44403c; border: 1px solid #d6d3d1; }
  </style>
</head>
<body>

<!-- ── Faint board + action button row ── -->
<div class="page">
  <div class="board-hint">roadmap board (4 columns × team rows)</div>
  <div class="action-row">
    <button class="ghost-btn"><span style="font-size:14px;">+</span> Add Team Row</button>
    <button class="ghost-btn summary-trigger" onclick="openModal()"><span>✦</span> Quarter Summary</button>
  </div>
</div>

<!-- ── Backdrop + modal ── -->
<div class="backdrop" id="backdrop" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-header-left">
        <div class="eyebrow">✦ Quarter Summary · Q3 2026</div>
        <div class="modal-title" id="modalTitle">What we achieved &amp; what's next</div>
        <div class="modal-sub" id="modalSub">A short summary for this quarter — write it yourself, formatted with Markdown.</div>
      </div>
      <button class="modal-close" onclick="closeModal()" title="Close">&#x2715;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- ── Demo state switcher (not part of the real app) ── -->
<div class="demo-controls">
  <span>Preview:</span>
  <button class="demo-btn" onclick="openModal(); setState('view')">Saved view</button>
  <button class="demo-btn sec" onclick="openModal(); setState('edit')">Edit</button>
  <button class="demo-btn sec" onclick="currentMd=''; openModal(); setState('view')">Empty state</button>
</div>

<script>
  // Sample "saved" content (this string is what lives in data.summary in the real app).
  const SAMPLE_MD = `## What we achieved
- **Bundled listing upsell** shipped in DE — first paid attach flow live, **+€180K** recurring already tracking.
- **FR checkout redesign** cut drop-off; **conversion +3.2pp** vs the prior funnel.
- Retired the legacy credits ledger, **saving ~€40K/yr** in ops overhead.

## Key insights
- Attach-rate is highest when the upsell appears *after* the first successful listing.
- The lift held across both cohorts, so this is **structural, not seasonal**.

## What we want to achieve next
1. **AT market launch** of the bundled upsell — target end of quarter.
2. Ship **self-serve plan changes** to remove the top support-ticket driver.

> Focus: turn the DE win into a repeatable playbook across markets.`;

  let currentMd = SAMPLE_MD;

  // ── Markdown-lite renderer (headings, bold, italic, code, lists, quote, link) ──
  function renderMd(src) {
    const esc = (s) => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const inline = (s) => esc(s)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>');
    const lines = (src || '').replace(/\r/g,'').split('\n');
    let html = '', list = null;
    const closeList = () => { if (list) { html += `</${list}>`; list = null; } };
    for (const raw of lines) {
      const line = raw.trimEnd();
      let m;
      if (!line.trim()) { closeList(); continue; }
      if ((m = line.match(/^##\s+(.*)/)))    { closeList(); html += `<h2>${inline(m[1])}</h2>`; continue; }
      if ((m = line.match(/^###\s+(.*)/)))   { closeList(); html += `<h3>${inline(m[1])}</h3>`; continue; }
      if ((m = line.match(/^>\s?(.*)/)))     { closeList(); html += `<blockquote>${inline(m[1])}</blockquote>`; continue; }
      if ((m = line.match(/^\d+\.\s+(.*)/))) { if (list!=='ol'){closeList(); html+='<ol>'; list='ol';} html += `<li>${inline(m[1])}</li>`; continue; }
      if ((m = line.match(/^[-*]\s+(.*)/)))  { if (list!=='ul'){closeList(); html+='<ul>'; list='ul';} html += `<li>${inline(m[1])}</li>`; continue; }
      closeList(); html += `<p>${inline(line)}</p>`;
    }
    closeList();
    return html;
  }

  const body = () => document.getElementById('modalBody');
  const footer = () => document.getElementById('modalFooter');
  const setSub = (t) => document.getElementById('modalSub').textContent = t;

  function setState(s) { if (s==='view') return renderView(); if (s==='edit') return renderEdit(); }

  // Read-only view (what everyone sees; also the owner's default when a summary exists)
  function renderView() {
    setSub("Current quarter · Q3 2026");
    if (!currentMd.trim()) {
      body().innerHTML = `<div class="empty-view">No summary yet for this quarter.<br>Click <strong>Edit</strong> to write one.</div>`;
      footer().innerHTML = `
        <span class="footer-note">Saved locally · published with your Backup</span>
        <button class="btn btn-dark" onclick="setState('edit')">✎ Write summary</button>`;
      return;
    }
    body().innerHTML = `<div class="rendered">${renderMd(currentMd)}</div>`;
    footer().innerHTML = `
      <span class="footer-note">Saved locally · published with your Backup</span>
      <button class="btn btn-dark" onclick="setState('edit')">✎ Edit</button>`;
  }

  // Editor: toolbar + textarea + live preview
  function renderEdit() {
    setSub("Write in Markdown — formatting renders live on the right. Paste in from anywhere.");
    body().innerHTML = `
      <div class="toolbar">
        <button class="tb-btn" title="Heading"    onclick="md('## ','')"><b>H</b></button>
        <button class="tb-btn" title="Subheading"  onclick="md('### ','')">H<sub style="font-size:8px">3</sub></button>
        <div class="tb-sep"></div>
        <button class="tb-btn" title="Bold"   onclick="md('**','**')"><b>B</b></button>
        <button class="tb-btn" title="Italic" onclick="md('*','*')"><i>I</i></button>
        <button class="tb-btn" title="Code"   onclick="md('\`','\`')">&lt;/&gt;</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" title="Bullet list"   onclick="md('- ','')">•</button>
        <button class="tb-btn" title="Numbered list" onclick="md('1. ','')">1.</button>
        <button class="tb-btn" title="Quote" onclick="md('> ','')">&rdquo;</button>
        <button class="tb-btn" title="Link"  onclick="md('[','](url)')">🔗</button>
      </div>
      <div class="editor-split">
        <textarea class="md-input" id="mdInput" placeholder="Paste or write the quarter summary…&#10;&#10;## What we achieved&#10;- …&#10;&#10;## What we want to achieve next&#10;1. …" oninput="syncPreview()">${currentMd.replace(/</g,'&lt;')}</textarea>
        <div class="preview-pane">
          <div class="preview-label">Live preview</div>
          <div class="rendered" id="mdPreview">${renderMd(currentMd)}</div>
        </div>
      </div>
      <div class="md-hint">Markdown: <code>## Heading</code> · <code>**bold**</code> · <code>*italic*</code> · <code>- list</code> · <code>1. list</code> · <code>&gt; quote</code> · <code>[text](url)</code></div>`;
    footer().innerHTML = `
      <span class="footer-note">Scope: current quarter only</span>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-light" onclick="setState('view')">Cancel</button>
        <button class="btn btn-dark" onclick="saveEditor()">Save summary</button>
      </div>`;
  }

  function syncPreview() { document.getElementById('mdPreview').innerHTML = renderMd(document.getElementById('mdInput').value); }
  function md(before, after) {
    const ta = document.getElementById('mdInput');
    const s = ta.selectionStart, e = ta.selectionEnd;
    const sel = ta.value.slice(s, e) || (after ? 'text' : '');
    ta.value = ta.value.slice(0, s) + before + sel + after + ta.value.slice(e);
    ta.focus(); ta.selectionStart = s + before.length; ta.selectionEnd = s + before.length + sel.length;
    syncPreview();
  }
  function saveEditor() { currentMd = document.getElementById('mdInput').value; setState('view'); }

  function openModal() {
    document.getElementById('backdrop').classList.add('open');
    if (!body().innerHTML.trim()) setState('view');
  }
  function closeModal() { document.getElementById('backdrop').classList.remove('open'); }
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
